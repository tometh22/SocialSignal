version: 1.0

defaults:
  lookback_months: 6
  lookahead_months: 2
  use_future_baseline: true
  low_ratio_threshold: 0.35
  high_ratio_threshold: 2.5
  min_baseline_points: 2
  mode: "autocorrect"
  strategy: "nearest_valid"
  max_gap_months: 6
  usd_tolerance_pct: 25
  log_level: "info"
  min_baseline_usd: 50
  lower_clamp_ratio: 0.6
  upper_clamp_ratio: 1.4

overrides:
  - projectKey: "play digital s.a (modo)|fee mensual"
    strategy: "nearest_valid"
    min_baseline_points: 1
    min_baseline_usd: 300
    low_ratio_threshold: 0.5
    expected_usd_band:
      low: 300
      high: 450
  
  - projectKey: "coelsa|fee mensual"
    strategy: "nearest_valid"
    min_baseline_points: 1
    min_baseline_usd: 300
    low_ratio_threshold: 0.5
