<!DOCTYPE html>
<html lang="en" style="margin:0; padding:0; background:#F7F8FA; overflow:hidden; height:100vh;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <style>
      /* 1. Elimina TODO margen/padding que pueda empujar el header */
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background: #F7F8FA !important;
        height: 100vh !important;
        width: 100% !important;
        overflow: hidden !important;
      }
      
      /* Fix específico para el contenedor body */
      body {
        position: relative !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
      }
      
      /* Asegurar que no haya espacios superiores */
      *, *::before, *::after {
        margin-top: 0 !important;
        padding-top: 0 !important;
        box-sizing: border-box !important;
      }
      
      /* Eliminar cualquier margen que pueda causar la franja gris */
      #root {
        margin-top: 0 !important;
        padding-top: 0 !important;
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background:#F7F8FA; overflow:auto; height:100vh; top:0; left:0; right:0; bottom:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
