<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind - Epical | Inicio de Sesión Directo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #0f172a;
      color: #e2e8f0;
    }
    .login-container {
      background-color: #1e293b;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }
    .logo p {
      color: #94a3b8;
      margin-top: 0.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #334155;
      border-radius: 4px;
      background-color: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .error-message {
      color: #ef4444;
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      background-color: rgba(239, 68, 68, 0.1);
      display: none;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>Mind - Epical</h1>
      <p>Plataforma de gestión de proyectos</p>
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="tunombre@epical.digital" 
          required
        >
      </div>
      
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="••••••••" 
          required
        >
      </div>
      
      <button type="submit">Iniciar Sesión</button>
    </form>
    
    <div id="error-message" class="error-message"></div>
    
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Iniciando sesión...</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form');
      const errorMessage = document.getElementById('error-message');
      const loading = document.getElementById('loading');
      
      // Caso especial para Victoria Puricelli - autocompletar
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('user') === 'victoria') {
        document.getElementById('email').value = 'victoria.puricelli@epical.digital';
        document.getElementById('password').value = 'epical2025';
      }
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Ocultar mensaje de error previo
        errorMessage.style.display = 'none';
        
        // Mostrar loader
        loading.style.display = 'block';
        
        // Obtener datos del formulario
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
          // Enviar solicitud de inicio de sesión
          const response = await fetch('/api/login-direct', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password }),
            credentials: 'include'
          });
          
          if (!response.ok) {
            // Si la respuesta no es exitosa, mostrar mensaje de error
            const responseText = await response.text();
            throw new Error(responseText || 'Error al iniciar sesión');
          }
          
          // Obtener texto HTML de la respuesta
          const html = await response.text();
          
          // Crear un elemento temporal para analizar el HTML
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          
          // Extraer el script y ejecutarlo
          const script = doc.querySelector('script');
          if (script) {
            eval(script.textContent);
          } else {
            // Redirigir directamente si no hay script
            window.location.href = '/';
          }
        } catch (error) {
          // Mostrar mensaje de error
          errorMessage.textContent = error.message || 'Error al iniciar sesión';
          errorMessage.style.display = 'block';
          
          // Ocultar loader
          loading.style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
